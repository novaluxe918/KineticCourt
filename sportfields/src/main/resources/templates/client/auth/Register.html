
<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Kinetic Court</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <style>

        body{
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg,#fff7f0,#ffe8d6);
            min-height:100vh;
        }

        .register-card{
            max-width:520px;
            width:100%;
            border:none;
            border-radius:24px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,.12);
        }

        .register-header{
            background:linear-gradient(135deg,#ff6b00,#ff8f3d);
            color:white;
            text-align:center;
            padding:40px 30px;
        }

        .logo-icon{
            width:80px;
            height:80px;
            background:white;
            color:#ff6b00;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 16px;
            font-size:36px;
        }

        .logo-title{
            font-weight:800;
            margin-bottom:6px;
        }

        .role-tab{
            border:none;
            background:white;
            padding:14px;
            font-weight:600;
            color:#6c757d;
            transition:.3s;
        }

        .role-tab.active{
            color:#ff6b00;
            border-bottom:3px solid #ff6b00;
        }

        .form-label{
            font-weight:600;
            margin-bottom:8px;
        }

        .form-control{
            border-radius:12px;
            padding:12px 16px;
            border:1px solid #dee2e6;
        }

        .form-control:focus{
            border-color:#ff6b00;
            box-shadow:0 0 0 .2rem rgba(255,107,0,.15);
        }

        .btn-orange{
            background:#ff6b00;
            border:none;
            color:white;
            font-weight:700;
            border-radius:12px;
            padding:14px;
            transition:.3s;
        }

        .btn-orange:hover{
            background:#e55f00;
            color:white;
        }

        .text-orange{
            color:#ff6b00;
        }

        .card-footer{
            background:white;
            border-top:1px solid #f1f1f1;
        }

    </style>
</head>

<body>

<div class="container min-vh-100 d-flex justify-content-center align-items-center py-4">

    <div class="card register-card">

        <!-- Header -->
        <div class="register-header">

            <h2 class="logo-title">
                Kinetic Court
            </h2>

            <p class="mb-0">
                Tham gia cộng đồng cầu lông ngay hôm nay
            </p>

        </div>

        <!-- Tabs -->
        <div class="card-header bg-white p-0">

            <div class="d-flex">

                <button type="button"
                        class="role-tab active flex-fill">
                    Người chơi
                </button>

                <button type="button"
                        class="role-tab flex-fill">
                    Chủ sân
                </button>

            </div>

        </div>

        <!-- Form -->
        <div class="card-body p-4">

            <form method="post"
                  th:object="${accountDTO}"
                  th:action="@{/register}">

                <div class="mb-3">
                    <label class="form-label">
                        Tên người dùng
                    </label>

                    <input th:field="*{name_user}"
                           type="text"
                           class="form-control"
                           placeholder="Nhập tên người dùng">

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('name_user')}"
                         th:errors="*{name_user}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Email
                    </label>

                    <input th:field="*{email}"
                           type="email"
                           class="form-control"
                           placeholder="example@gmail.com">

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Mật khẩu
                    </label>

                    <input th:field="*{password}"
                           type="password"
                           class="form-control"
                           placeholder="********">

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Xác nhận mật khẩu
                    </label>

                    <input th:field="*{confirmPassword}"
                           type="password"
                           class="form-control"
                           placeholder="********">

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}">
                    </div>
                </div>

                <button type="submit"
                        class="btn btn-orange w-100">
                    Đăng Ký Ngay
                </button>

            </form>

        </div>

        <!-- Footer -->
        <div class="card-footer text-center py-3">

            Đã có tài khoản?

            <a th:href="@{/login}"
               class="fw-bold text-decoration-none text-orange">
                Đăng nhập
            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
