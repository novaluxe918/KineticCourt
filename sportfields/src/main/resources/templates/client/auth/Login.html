<!doctype html>
<html lang="vi" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Kinetic Court</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet">

    <!-- Material Icon -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <style>
        body {
            background: #fcf9f8;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .logo-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #a73b00;
        }

        .primary-color {
            color: #a73b00;
        }

        .btn-login {
            background: #ff5f05;
            color: white;
            font-weight: 700;
            border: none;
        }

        .btn-login:hover {
            background: #e55400;
            color: white;
        }

        .active-tab {
            border-bottom: 3px solid #a73b00;
            color: #a73b00 !important;
            font-weight: 600;
        }

        .login-card {
            max-width: 480px;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- Logo -->
    <div class="text-center mb-4">
        <h1 class="logo-title display-5">Kinetic Court</h1>
        <p class="text-secondary fw-bold text-uppercase">
            Professional Athletics
        </p>
    </div>

    <!-- Card -->
    <div class="card shadow-sm login-card">

        <!-- Tabs -->
        <div class="card-header bg-white p-0">
            <div class="d-flex">
                <button id="tab-player"
                        class="btn flex-fill rounded-0 active-tab"
                        >
                    Người chơi
                </button>

                <button id="tab-owner"
                        class="btn flex-fill rounded-0 text-secondary"
                        >
                    Chủ sân
                </button>
            </div>
        </div>

        <div class="card-body p-4">

            <div class="text-center mb-4">
                <h3>Chào mừng trở lại</h3>
                <p id="form-subtitle" class="text-muted">
                    Đăng nhập để bắt đầu trận đấu của bạn
                </p>
                <p th:text="${message}" class="text-danger"></p>
            </div>

            <form method="post"  th:object="${accountDTO}"
                  th:action="@{/login}">

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">
                        Email hoặc Số điện thoại
                    </label>
                    <div class="input-group">
                            <span class="input-group-text">
                                <span class="material-symbols-outlined">
                                    person
                                </span>
                            </span>

                        <input th:field="*{email}" type="text"
                               class="form-control"
                               placeholder="name@example.com">
                    </div>
                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">
                        Mật khẩu
                    </label>

                    <div class="input-group">
                            <span class="input-group-text">
                                <span class="material-symbols-outlined">
                                    lock
                                </span>
                            </span>

                        <input th:field="*{password}" type="password"
                               id="password"
                               class="form-control"
                               placeholder="••••••••">

                        <button type="button"
                                class="btn btn-outline-secondary">

                                <span id="eye"
                                      class="material-symbols-outlined">
                                    visibility
                                </span>
                        </button>
                    </div>

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}">
                    </div>
                </div>

                <!-- Remember -->
                <div class="d-flex justify-content-between mb-4">
                    <div class="form-check">
                        <input class="form-check-input"
                               type="checkbox">

                        <label class="form-check-label">
                            Ghi nhớ đăng nhập
                        </label>
                    </div>

                    <a href="#" class="text-decoration-none primary-color">
                        Quên mật khẩu?
                    </a>
                </div>

                <!-- Button -->
                <button class="btn btn-login w-100 py-3">
                    Đăng nhập ngay
                </button>

            </form>

            <!-- Divider -->
            <div class="text-center my-4 position-relative">
                <hr>
                <span class="bg-white px-3 position-absolute top-50 start-50 translate-middle text-muted">
                        Hoặc tiếp tục với
                    </span>
            </div>

            <!-- Social -->
            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-outline-secondary w-100">
                        Google
                    </button>
                </div>

                <div class="col-6">
                    <button class="btn btn-outline-secondary w-100">
                        Facebook
                    </button>
                </div>
            </div>

        </div>

        <!-- Footer -->
        <div class="card-footer text-center bg-light">
            Chưa có tài khoản?
            <a href="#"
               class="text-decoration-none fw-bold primary-color">
                Đăng ký ngay
            </a>
        </div>

    </div>

</div>


</body>

</html>
