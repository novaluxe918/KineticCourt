<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
       lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<header th:fragment="header" class="glass-nav fixed top-0 w-full z-50 border-b border-surface-variant/30 transition-all duration-300">
    <nav class="flex justify-between items-center px-gutter py-4 w-full max-w-container-max mx-auto">
        <div class="flex items-center gap-12">
            <a class="font-headline-md text-headline-md font-extrabold text-primary tracking-tighter" href="#">
                KINETIC<span class="text-on-background">COURT</span>
            </a>
            <div class="hidden lg:flex gap-8 items-center">
                <a class="text-on-background font-semibold border-b-2 border-primary-container py-1 font-Inter" href="#">Home</a>
                <a class="text-secondary hover:text-primary-container transition-colors font-medium font-Inter" href="#">Bookings</a>
                <a class="text-secondary hover:text-primary-container transition-colors font-medium font-Inter" href="#">Facilities</a>
                <a class="text-secondary hover:text-primary-container transition-colors font-medium font-Inter" href="#">About</a>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <a th:href="@{/login}" class="hidden sm:block text-on-background font-semibold hover:text-primary-container transition-colors">Login</a>
            <a th:href="@{/register}" class="bg-primary-container text-white font-bold px-8 py-2.5 rounded-full hover:shadow-lg hover:shadow-primary-container/20 active:scale-95 transition-all">Sign Up</a>
        </div>
        <div class="relative" th:if="${session.loginUser != null}">

            <button id="userMenuBtn"
                    class="flex items-center gap-3 focus:outline-none">

                <img th:src="${session.loginUser.avatar != null ? session.loginUser.avatar : 'https://cdn-media.sforum.vn/storage/app/media/ctv_seo8/ctv_phung/avatar-vo-tri-nam/avatar-vo-tri-nam-2.jpg'}"
                     class="w-10 h-10 rounded-full object-cover border">

                <span class="font-semibold"
                      th:text="${session.loginUser.name_user}">
            User
        </span>

                <svg class="w-4 h-4" fill="none" stroke="currentColor"
                     stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round"
                          stroke-linejoin="round"
                          d="M19 9l-7 7-7-7"/>
                </svg>

            </button>

            <!-- Dropdown -->
            <div id="userDropdown"
                 class="hidden absolute right-0 mt-3 w-56 bg-white rounded-xl shadow-xl border overflow-hidden z-50">

                <a
                   class="block px-5 py-3 hover:bg-gray-100">
                    📅 Lịch sử đặt sân
                </a>

                <a
                   class="block px-5 py-3 hover:bg-gray-100">
                    👤 Hồ sơ cá nhân
                </a>

                <hr>

                <a th:href="@{/logout}"
                   class="block px-5 py-3 text-red-600 hover:bg-red-50">
                    🚪 Đăng xuất
                </a>

            </div>

        </div>
    </nav>
</header>
</body>
</html>
