    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #F8FAFC;
        }
        .bento-card {
            background: white;
            border: 1px solid #E2E8F0;
            transition: all 0.2s ease;
        }
        .bento-card:hover {
            box-shadow: 0px 4px 12px rgba(15, 23, 42, 0.05);
        }
        .chart-gradient {
            background: linear-gradient(180deg, rgba(255, 102, 0, 0.1) 0%, rgba(255, 102, 0, 0) 100%);
        }
    </style>

<body class="font-body-md text-on-surface bg-background">
<!-- SideNavBar Shell -->
  <div th:replace="admin/fragments/NavbarAdmin:: navbaradmin"></div>
<!-- TopNavBar Shell -->
  <div th:replace="admin/fragments/Header:: header"></div>
<!-- Main Content Canvas -->
  <div layout:fragment="content"></div>
<!-- Micro-interaction Scripts -->
<script>
    // Simple logic for sidebar toggle if needed on mobile, though we follow sideNav rules for admin
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.getAttribute('href') === '#') e.preventDefault();
        });
    });

    // Search bar focus effect
    const searchInput = document.querySelector('input[type="text"]');
    searchInput.addEventListener('focus', () => {
        searchInput.parentElement.classList.add('ring-2', 'ring-primary');
    });
    searchInput.addEventListener('blur', () => {
        searchInput.parentElement.classList.remove('ring-2', 'ring-primary');
    });
</script>
</body></html>
