<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{owner/layout/LayoutOwner}" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<main layout:fragment="main" class="ml-64 mt-16 p-10 min-h-[calc(100vh-4rem)]">
  <!-- Header Section -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
    <div>
      <h3 class="font-headline-lg text-headline-lg text-on-surface mb-2 tracking-tight">Facility Management</h3>
      <p class="text-on-surface-variant max-w-xl font-body-md text-sm leading-relaxed">Centralized control for your entire sports ecosystem. Monitor performance metrics and club status in real-time.</p>
    </div>
    <button class="bg-primary text-white font-bold px-7 py-3.5 rounded-2xl shadow-lg shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center gap-2.5">
      <span class="material-symbols-outlined text-lg">add_business</span>
      <span>New Facility</span>
    </button>
  </div>
  <!-- Facility List -->
  <div class="space-y-8">
    <div class="flex items-center justify-between pb-2 border-b border-outline-variant/30">
      <h4 class="font-headline-md text-xl font-bold text-on-surface">Owned Facilities</h4>
      <div class="flex bg-surface-container-low p-1 rounded-xl">
        <button class="p-2 rounded-lg text-on-surface-variant hover:text-on-surface transition-colors"><span class="material-symbols-outlined text-[20px]">grid_view</span></button>
        <button class="p-2 rounded-lg bg-white text-primary shadow-sm"><span class="material-symbols-outlined text-[20px]">list</span></button>
      </div>
    </div>
    <div class="grid grid-cols-1 gap-6">
      <!-- Facility Card 1 -->
      <div th:each="facility : ${facilities}" class="bg-white rounded-[2rem] border border-outline-variant/50 overflow-hidden flex flex-col md:flex-row premium-card-shadow group hover:border-primary/30 transition-all duration-300">
        <div class="md:w-80 h-56 md:h-auto overflow-hidden relative">
          <img alt="Smash Central" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" th:src="${facility.img_url}"/>
          <div th:switch="${facility.status.name()}" class="absolute top-5 left-5">

    <span th:case="'ACTIVE'"
          class="bg-white/95 backdrop-blur shadow-xl text-green-700 px-4 py-1.5 rounded-full">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        Active
    </span>

            <span th:case="'PENDING'"
                  class="bg-white/95 backdrop-blur shadow-xl text-yellow-700 px-4 py-1.5 rounded-full">
        Pending
    </span>

            <span th:case="'CLOSED'"
                  class="bg-white/95 backdrop-blur shadow-xl text-red-700 px-4 py-1.5 rounded-full">
        Closed
    </span>

          </div>
        </div>
        <div class="flex-grow p-8 flex flex-col justify-between">
          <div class="flex justify-between items-start">
            <div>
              <h5 th:text="${facility.name_facility}" class="font-headline-md text-2xl font-bold text-on-surface mb-2 group-hover:text-primary transition-colors"></h5>
              <div class="flex items-center gap-2 text-on-surface-variant">
                <span class="material-symbols-outlined text-base">location_on</span>
                <span th:text="${facility.address}" class="text-sm"></span>
              </div>
            </div>
            <div class="text-right">
              <p class="font-label-md text-[10px] text-on-surface-variant uppercase tracking-widest mb-1">Capacity</p>
              <p class="font-headline-md text-2xl font-extrabold text-primary">12 <span class="text-xs text-on-surface-variant font-normal">Courts</span></p>
            </div>
              <div class="flex gap-4">
                  <button class="px-5 py-2.5 bg-surface-container-low text-on-surface font-bold rounded-xl text-sm hover:bg-surface-container transition-all flex items-center gap-2">
                      <span class="material-symbols-outlined text-lg">settings</span> Edit
                  </button>
                  <button class="px-5 py-2.5 bg-secondary text-white font-bold rounded-xl text-sm shadow-md shadow-secondary/10 hover:shadow-secondary/30 hover:brightness-110 transition-all flex items-center gap-2">
                      <span class="material-symbols-outlined text-lg">visibility</span> Details
                  </button>
              </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</main>
</body>
</html>
