<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org"
       xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<aside th:fragment="navbar" class="h-screen w-64 fixed left-0 top-0 border-r border-outline-variant flex flex-col bg-white z-50">
  <div class="flex flex-col h-full p-6 overflow-y-auto sidebar-scroll">
    <!-- Brand Identity -->
    <div class="mb-10 pl-2">
      <h1 class="font-headline-md text-headline-md font-extrabold text-primary tracking-tight">Kinetic Court</h1>
      <p class="text-on-surface-variant font-label-md text-[11px] uppercase tracking-[0.2em] mt-1">Owner Portal</p>
    </div>
    <!-- Main Navigation -->
    <nav class="flex-grow space-y-1">
      <a th:href="@{/add}" class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">app_registration</span>
        <span class="font-label-md">Registration</span>
      </a>
      <a th:href="@{/facilities_owner}" class="flex items-center gap-3 px-4 py-3 bg-primary-fixed text-on-primary-fixed-variant rounded-xl font-bold shadow-sm" href="#">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">location_city</span>
        <span class="font-label-md">Clubs</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">sports_tennis</span>
        <span class="font-label-md">Courts</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">calendar_month</span>
        <span class="font-label-md">Schedule</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">inventory_2</span>
        <span class="font-label-md">Services</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">confirmation_number</span>
        <span class="font-label-md">Bookings</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">payments</span>
        <span class="font-label-md">Revenue</span>
      </a>
      <a class="flex items-center gap-3 px-4 py-3 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all group" href="#">
        <span class="material-symbols-outlined group-hover:text-primary">rate_review</span>
        <span class="font-label-md">Reviews</span>
      </a>
    </nav>
    <!-- Bottom Actions -->
    <div class="mt-8 space-y-4">
      <button class="w-full py-3.5 bg-primary-container text-on-primary-container font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2 shadow-md hover:shadow-lg">
        <span class="material-symbols-outlined">add</span>
        <span>Add Court</span>
      </button>
      <div class="pt-4 border-t border-outline-variant space-y-1">
        <a class="flex items-center gap-3 px-4 py-2.5 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all text-sm font-medium" href="#">
          <span class="material-symbols-outlined text-[20px]">settings</span>
          <span>Settings</span>
        </a>
        <a th:href="@{/logout}" class="flex items-center gap-3 px-4 py-2.5 text-on-surface-variant hover:bg-surface-container-low rounded-xl transition-all text-sm font-medium" >
          <span class="material-symbols-outlined">logout</span>
          <span>Logout</span>
        </a>
      </div>
    </div>
  </div>
</aside>
</body>
</html>
